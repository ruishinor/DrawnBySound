<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VibratoFlow</title>
    <meta name="description" content="A private, real-time music visualizer for microphone, files, and supported shared audio." />
    <meta name="theme-color" content="#f3f4f6" />
    <script>
      (() => {
        let preference = 'system';
        try {
          for (const key of ['vibratoflow.settings.v3', 'vibratoflow.settings.v2']) {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const stored = JSON.parse(raw);
            if (stored && ['system', 'light', 'dark'].includes(stored.appearance)) {
              preference = stored.appearance;
              break;
            }
          }
        } catch {
          preference = 'system';
        }
        const resolved =
          preference === 'system'
            ? matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : preference;
        document.documentElement.dataset.theme = resolved;
        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.content = resolved === 'dark' ? '#111317' : '#f3f4f6';
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/Flow-favicon.svg" />
    <link rel="apple-touch-icon" href="/Flow-apple-touch-icon.png" />
    <link rel="manifest" href="/Flow-site.webmanifest" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="VibratoFlow home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>VibratoFlow</strong>
            <small>Music, drawn live</small>
          </span>
        </a>
        <div class="utility-actions" aria-label="Visual actions">
          <button id="export" class="quiet-button" type="button">Save frame</button>
          <button
            id="settings-btn"
            class="quiet-button"
            type="button"
            aria-controls="panel"
            aria-expanded="false"
          >
            Adjust
          </button>
        </div>
      </header>

      <main id="stage" class="stage" aria-label="Live music visualization">
        <canvas id="viz">Your browser does not support the visualization canvas.</canvas>
        <div class="stage-label" aria-hidden="true">
          <span id="source-kicker">Demo</span>
          <strong id="source-title">Generated signal</strong>
        </div>
      </main>

      <section id="control-deck" class="control-deck" aria-label="Audio source controls">
        <div class="source-controls" role="group" aria-label="Choose what VibratoFlow listens to">
          <button id="demo" class="source-button" type="button" aria-pressed="true">
            <span>Demo</span>
            <small>Try it now</small>
          </button>
          <button id="mic" class="source-button" type="button" aria-pressed="false">
            <span>Microphone</span>
            <small>Room or speaker</small>
          </button>
          <button id="system" class="source-button" type="button" aria-pressed="false">
            <span>Other app</span>
            <small>When supported</small>
          </button>
          <button id="file-trigger" class="source-button" type="button" aria-pressed="false">
            <span>Audio file</span>
            <small id="file-label">Choose from device</small>
          </button>
          <label class="visually-hidden" for="file">Choose audio file</label>
          <input id="file" name="audio-file" class="visually-hidden" type="file" accept="audio/*" />
        </div>

        <div class="session-row">
          <div class="session-copy">
            <p id="status" role="status" aria-live="polite">Loading VibratoFlow…</p>
            <p id="capability-note">
              Audio stays on this device. Listening to another app depends on browser, operating system, and the source app.
            </p>
          </div>
          <button id="stop" class="stop-button" type="button">Stop listening</button>
        </div>

        <div id="transport" class="transport" hidden>
          <button id="playpause" class="transport-button" type="button" aria-label="Play">Play</button>
          <label class="seek-control" for="seek">
            <span class="visually-hidden">Playback position</span>
            <input id="seek" name="playback-position" type="range" min="0" max="1" step="0.001" value="0" />
          </label>
          <span id="time">0:00 / 0:00</span>
        </div>
      </section>
    </div>

    <aside id="panel" role="dialog" aria-labelledby="settings-title" hidden></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
