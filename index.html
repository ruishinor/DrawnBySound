<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Drawn by Sound</title>
    <meta name="description" content="A private, real-time music visualizer for microphone, files, and supported shared audio." />
    <meta name="theme-color" content="#dfe1df" />
    <script src="/theme-init.js"></script>
    <link rel="icon" type="image/svg+xml" href="/drawn-by-sound-favicon.svg" />
    <link rel="apple-touch-icon" href="/drawn-by-sound-apple-touch-icon.png" />
    <link rel="manifest" href="/drawn-by-sound.webmanifest" crossorigin="use-credentials" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Drawn by Sound home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>Drawn by Sound</strong>
            <small>Music, drawn live</small>
          </span>
        </a>
        <div class="utility-actions" aria-label="Visual actions">
          <button id="export" class="quiet-button" type="button">Save image</button>
          <button
            id="settings-btn"
            class="quiet-button"
            type="button"
            aria-controls="panel"
            aria-expanded="false"
          >
            Settings
          </button>
        </div>
      </header>

      <main id="stage" class="stage" aria-label="Live music visualization">
        <canvas id="viz">Your browser does not support the visualization canvas.</canvas>
        <div class="stage-label" aria-hidden="true">
          <span id="source-kicker">Demo</span>
          <strong id="source-title">Sample signal</strong>
        </div>
        <button
          id="fullscreen-toggle"
          class="stage-action fullscreen-toggle"
          type="button"
          aria-label="Enter full screen"
          aria-pressed="false"
          title="Enter full screen"
        >
          <svg class="fullscreen-icon fullscreen-icon--enter" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" />
          </svg>
          <svg class="fullscreen-icon fullscreen-icon--exit" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 3v6H3M15 3v6h6M9 21v-6H3M15 21v-6h6" />
          </svg>
        </button>
        <span id="view-mode-status" class="visually-hidden" role="status" aria-live="polite"></span>
      </main>

      <section id="control-deck" class="control-deck" aria-label="Audio source controls">
        <div class="session-row">
          <div class="session-copy">
            <p id="status" role="status" aria-live="polite">Loading Drawn by Sound…</p>
            <p id="capability-note">
              Audio stays on this device. External app capture depends on browser, operating system, and the source app.
            </p>
          </div>
          <button id="stop" class="stop-button" type="button">Stop listening</button>
        </div>

        <div id="transport" class="transport" hidden>
          <button id="playpause" class="transport-button" type="button" aria-label="Play">Play</button>
          <label class="seek-control" for="seek">
            <span class="visually-hidden">Playback position</span>
            <input id="seek" name="playback-position" type="range" min="0" max="1" step="0.001" value="0" />
          </label>
          <span id="time">0:00 / 0:00</span>
        </div>

        <div class="source-controls" role="group" aria-label="Choose what Drawn by Sound listens to">
          <button id="mic" class="source-button" type="button" aria-pressed="false">
            <span>Microphone</span>
            <small>Room or speaker</small>
          </button>
          <button id="system" class="source-button" type="button" aria-pressed="false">
            <span>External app</span>
            <small>Desktop browsers</small>
          </button>
          <button id="file-trigger" class="source-button" type="button" aria-pressed="false">
            <span>Audio file</span>
            <small id="file-label">Choose from device</small>
          </button>
          <button id="demo" class="source-button" type="button" aria-pressed="true">
            <span>Demo</span>
            <small>Sample signal</small>
          </button>
          <label class="visually-hidden" for="file">Choose audio file</label>
          <input id="file" name="audio-file" class="visually-hidden" type="file" accept="audio/*" />
        </div>
      </section>
    </div>

    <aside id="panel" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
